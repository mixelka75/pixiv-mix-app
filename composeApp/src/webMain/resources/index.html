<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a1a" />
    <title>PixMix</title>
    <style>
        /* Compose's wasm canvas measures itself against its container — without
           explicit 100% sizing on html/body the canvas comes up with 0 height
           until the window resizes (which is what made resize feel like a fix). */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            color: #f0f0f0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        #pixmix-root {
            width: 100vw;
            height: 100vh;
        }
        /* Shown until the first compose composition finishes; Main.kt removes
           the node so it doesn't keep covering the rendered canvas. */
        #pixmix-loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="pixmix-root"></div>
    <div id="pixmix-loading">Loading PixMix…</div>
    <script type="application/javascript" src="composeApp.js"></script>
</body>
</html>
