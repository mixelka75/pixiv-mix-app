# PixMix reverse proxy.
# Drop into /etc/nginx/sites-available/api.pixiv.mxl.wtf.conf and symlink into sites-enabled/.
#
# This config covers ALL clients — Android, Desktop, *and* the web build:
#  - Android/Desktop send `Cookie:` directly + `X-Pixmix-Token` for the gate.
#  - Web (browser) can't send cross-origin Cookie, so it mirrors session into
#    `X-Pixmix-Cookie` and reads server cookies back from `X-Pixmix-Set-Cookie`.
#  - Web also needs CORS preflight + Access-Control-* headers.
#
# Why not Cloudflare Workers: pixiv's WAF blocks Cloudflare's egress IP ranges
# ("ブロックされました"). A real VPS in Helsinki/Falkenstein/etc passes through.

# Echo the request Origin back if it's set (so credentialed CORS works); fall
# back to "*" otherwise. Keeping it permissive — the X-Pixmix-Token gate is
# what stops random callers, not the Origin check.
map $http_origin $cors_origin {
    default      "*";
    "~^https?://" $http_origin;
}

# When the browser sends an X-Pixmix-Cookie header, prefer it over the bare
# Cookie header (which the browser strips cross-origin anyway). Native clients
# send Cookie directly and don't set X-Pixmix-Cookie, so they fall through.
map $http_x_pixmix_cookie $effective_cookie {
    default      $http_x_pixmix_cookie;
    ""           $http_cookie;
}

# Echo whatever headers the browser asked for in preflight. Ktor's JS engine
# adds non-simple headers (User-Agent etc.) the browser then needs us to
# explicitly allow — chasing them one-by-one is a losing game.
map $http_access_control_request_headers $cors_allow_headers {
    default      $http_access_control_request_headers;
    ""           "Content-Type, Accept, Accept-Language, User-Agent, X-Pixmix-Token, X-Pixmix-Cookie, X-CSRF-Token";
}

# 1) HTTP → HTTPS redirect (and ACME challenge passthrough left to certbot's nginx plugin)
server {
    listen      80;
    listen      [::]:80;
    server_name api.pixiv.mxl.wtf;
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2) The actual reverse proxy
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name api.pixiv.mxl.wtf;

    # Bootstrap with the system snakeoil cert so `nginx -t` passes before certbot
    # has fetched a real one. Certbot's nginx plugin will rewrite these two lines
    # in-place after the first successful issuance. (Requires `apt install ssl-cert`.)
    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

    server_tokens off;
    client_max_body_size 50m;

    # Trivial allowlist by shared token. Set the same value in the app's Settings.
    set $pixmix_token "REPLACE_ME_WITH_LONG_RANDOM_STRING";

    # Public health probe (no auth) — handy for monitors and quick smoke tests.
    location = /health {
        default_type text/plain;
        add_header Access-Control-Allow-Origin $cors_origin always;
        return 200 "pixmix-proxy ok\n";
    }

    # ----- AJAX, search, ranking, login pages, etc. -----
    location /pixiv/ {
        # CORS preflight — answer before any auth check so browsers can discover
        # what's allowed. The actual gated request (the one with credentials)
        # follows the preflight, and we check the token there.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials "true"       always;
            add_header Access-Control-Allow-Methods     "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers     $cors_allow_headers always;
            add_header Access-Control-Max-Age           86400        always;
            add_header Vary "Origin, Access-Control-Request-Headers" always;
            return 204;
        }

        if ($http_x_pixmix_token != $pixmix_token) { return 403; }

        proxy_pass         https://www.pixiv.net/;
        proxy_set_header   Host                www.pixiv.net;
        proxy_set_header   User-Agent          $http_user_agent;
        proxy_set_header   Accept-Language     $http_accept_language;
        proxy_set_header   Cookie              $effective_cookie;
        proxy_set_header   Referer             "https://www.pixiv.net/";
        proxy_set_header   Origin              "https://www.pixiv.net";
        proxy_set_header   X-Pixmix-Token      "";
        proxy_set_header   X-Pixmix-Cookie     "";
        proxy_set_header   X-Real-IP           "";
        proxy_set_header   X-Forwarded-For     "";
        # Force identity encoding upstream. Otherwise pixiv replies gzip'd with a
        # compressed Content-Length; the browser transparently decompresses for
        # fetch(), Ktor's JS engine then compares decompressed body length to the
        # original Content-Length header and throws "Content-Length mismatch".
        proxy_set_header   Accept-Encoding     "";
        proxy_ssl_server_name on;
        proxy_ssl_name     www.pixiv.net;
        proxy_http_version 1.1;
        proxy_buffering    on;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 10s;

        # Browsers refuse to honour Set-Cookie from a cross-origin response, so
        # surface upstream cookies under a custom header the web client knows
        # to read. Native clients ignore this and use Cookie/Set-Cookie normally
        # (the bare Set-Cookie still passes through because we don't hide it
        # for non-browser callers — we just supplement it with the mirror).
        add_header X-Pixmix-Set-Cookie $upstream_http_set_cookie always;

        # CORS headers on the real response.
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"       always;
        add_header Access-Control-Expose-Headers    "X-Pixmix-Set-Cookie" always;
        add_header Vary "Origin" always;
    }

    # ----- CDN with the actual images -----
    location /img/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers $cors_allow_headers always;
            add_header Access-Control-Max-Age       86400 always;
            add_header Vary "Origin, Access-Control-Request-Headers" always;
            return 204;
        }

        if ($http_x_pixmix_token != $pixmix_token) { return 403; }

        proxy_pass         https://i.pximg.net/;
        proxy_set_header   Host                i.pximg.net;
        proxy_set_header   User-Agent          $http_user_agent;
        proxy_set_header   Referer             "https://www.pixiv.net/";
        proxy_set_header   X-Pixmix-Token      "";
        proxy_set_header   X-Pixmix-Cookie     "";
        proxy_set_header   X-Real-IP           "";
        proxy_set_header   X-Forwarded-For     "";
        # Images are already compressed (jpeg/png/webp) — no value in gzip, and
        # avoiding any transfer-encoding keeps Content-Length consistent for the
        # browser's fetch() pipeline.
        proxy_set_header   Accept-Encoding     "";
        proxy_ssl_server_name on;
        proxy_ssl_name     i.pximg.net;
        proxy_http_version 1.1;
        proxy_buffering    on;
        proxy_read_timeout 60s;

        # Long browser caching for immutable image objects.
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Vary "Origin" always;
    }

    # Anything else under this hostname → 404 (don't leak default vhost).
    location / { return 404; }
}
