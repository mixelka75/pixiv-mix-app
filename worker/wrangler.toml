name = "pixmix-proxy"
main = "src/index.ts"
compatibility_date = "2026-05-05"
# Bind the friendly domain. wrangler will auto-create DNS / SSL for it as long as
# the zone (mxl.wtf) lives in the same Cloudflare account.
routes = [
    { pattern = "api.pixiv.mxl.wtf", custom_domain = true },
]

# CORS origin allowlist for the web build. Set to "*" for permissive (any origin),
# or a single origin string. Sent on every response.
[vars]
ALLOWED_ORIGIN = "https://pixiv.mxl.wtf"

# PIXMIX_TOKEN is a shared secret — clients must send it in the `X-Pixmix-Token`
# header. Without it any random visitor could use your worker as a free proxy.
# Set with: npx wrangler secret put PIXMIX_TOKEN
